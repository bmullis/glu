name: Glu
options:
  bundleIdPrefix: com.glu
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.1"
targets:
  Glu:
    type: application
    platform: macOS
    sources:
      - Glu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glu.clipboard
        INFOPLIST_FILE: Glu/Resources/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "NO"
    dependencies:
      - package: HotKey
